<!DOCTYPE html>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        /* 动物森友会风格配色 */

                        'pixel-bg-card': '#FFF8E7',
                        'pixel-panel': '#FFF8E7',
                        'pixel-border': '#D4C4B0',

    <style>
/* 自定义字体 */
@font-face {
    font-family: 'MaokenTangYuan';
    src: url('fonts/猫啃网糖圆体(测试版)0.12.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
}

/* Fredoka 字体 */
@font-face {
    font-family: 'Fredoka';
    src: url('fonts/Fredoka-Regular.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
}
@font-face {
    font-family: 'Fredoka';
    src: url('fonts/Fredoka-Medium.ttf') format('truetype');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
}
@font-face {
    font-family: 'Fredoka';
    src: url('fonts/Fredoka-SemiBold.ttf') format('truetype');
    font-weight: 600;
    font-style: normal;
    font-display: swap;
}
@font-face {
    font-family: 'Fredoka';
    src: url('fonts/Fredoka-Bold.ttf') format('truetype');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
}

/* 隐藏滚动条 */
html {
    scrollbar-width: none;           /* Firefox */
    -ms-overflow-style: none;       /* IE/Edge legacy */
}

html::-webkit-scrollbar {
    display: none;                  /* Chrome/Safari/Edge */
}

body::-webkit-scrollbar {
    display: none;                  /* Chrome/Safari/Edge */
}

/* 动画 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-8px) rotate(2deg); }
            75% { transform: translateY(-4px) rotate(-2deg); }
        }
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        .animate-fadeInUp { animation: fadeInUp 0.6s ease; }
        .animate-fadeInUp-delay { animation: fadeInUp 0.6s ease 0.15s backwards; }
        .animate-fadeInUp-delay-2 { animation: fadeInUp 0.6s ease 0.3s backwards; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-bounceIn { animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); }

        /* 功能卡片 - 动物森友会风格 */
        .feature-card {
            background: #FFF8E7;
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px rgba(180, 140, 100, 0.25);
            position: relative;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .feature-card::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 3px dashed #F4CDB8;
            border-radius: calc(1.5rem - 8px);
            pointer-events: none;
            z-index: 1;
        }

        .feature-card:hover {
            transform: scale(1.05);
        }

        .feature-card__title {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.65rem;
            font-weight: 600;
            color: #1a4875;
            letter-spacing: 0.02em;
            margin: 0;
        }

        .feature-card__desc {
            font-family: 'MaokenTangYuan', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            color: #5a9aab;
            margin: 0;
            margin-top: -0.25rem;
            text-align: center;
        }

        .feature-card__icon {
            color: #5BA88F;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .feature-card:hover .feature-card__icon {
            transform: scale(1.1);
        }

        /* 波浪边框 */
        .waviy {
            position: relative;
            width: 100%;
            overflow: hidden;
            line-height: 0;
            background-color: #aedaaf;
        }

        .waviy svg {
            position: relative;
            display: block;
            width: calc(100% + 1.3px);
            height: 40px;
        }
    </style>
    <link rel="stylesheet" href="css/share.css">
</head>
<body class="min-h-screen text-pixel-text relative overflow-x-hidden" style="background-color: #fdf4d7;">
    <!-- 分享按钮 -->

<!-- 页脚 -->
