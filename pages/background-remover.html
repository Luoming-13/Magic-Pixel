<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG Remover - Magic Pixel</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/background-remover.css">
    <link rel="stylesheet" href="../css/share.css">
    <link rel="stylesheet" href="../css/i18n.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background-color: #fdf4d7;">
    <!-- 语言切换按钮 -->
    <button class="lang-switch" id="langSwitch" data-i18n-title="switchLang">
        <svg class="lang-switch__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span class="lang-switch__current" id="langCurrent"></span>
    </button>

    <!-- 分享按钮 -->
    <button class="share-btn" id="shareBtn" data-i18n-title="shareBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
    </button>

    <!-- 收藏按钮 -->
    <button class="favorite-btn" id="favoriteBtn" data-i18n-title="favoriteBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
    </button>

    <!-- 头部 -->
    <header class="header has-lang-switch">
        <div class="header__nav">
            <a href="../index.html" class="header__back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                <span data-i18n="backHome">返回首页</span>
            </a>
        </div>
        <div class="header__logo">
            <span class="header__icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
                    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                    <path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
                </svg>
            </span>
            <div class="header__titles">
                <h1 class="header__main-title" data-i18n="appName">Magic Pixel</h1>
                <p class="header__sub-title">BG Remover</p>
            </div>
        </div>
    </header>

    <!-- 波浪边框 -->
    <div class="waviy">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 80" preserveAspectRatio="none">
            <path fill="#fdf4d7" d="M0,40 C120,80 240,0 360,40 C480,80 600,0 720,40 C840,80 960,0 1080,40 C1200,80 1320,0 1440,40 L1440,80 L0,80 Z"></path>
        </svg>
    </div>

    <!-- 主内容区 -->
    <main class="main-container">
        <!-- 左侧控制面板 -->
        <aside class="control-panel">
            <div class="control-card">
                <!-- 上传区域 -->
                <div class="card-section">
                    <h3 class="card-section__title" data-i18n="uploadImage">导入图片</h3>
                    <div class="upload-zone" id="uploadZone">
                        <div class="upload-zone__content">
                            <svg class="upload-zone__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <p class="upload-zone__text" data-i18n="dragImage">拖拽图片到此处</p>
                            <p class="upload-zone__formats" data-i18n="supportedFormatsBG">支持批量上传 JPG, PNG, WebP</p>
                        </div>
                        <input type="file" id="fileInput" accept="image/*" multiple hidden>
                    </div>
                </div>

                <!-- 抠图模式 -->
                <div class="card-section" id="removalModeSection" style="display: none;">
                    <h3 class="card-section__title" data-i18n="removalMode">抠图模式</h3>
                    <nav class="mode-nav mode-nav--vertical">
                        <button class="mode-nav__btn mode-nav__btn--active" data-mode="auto">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                            </svg>
                            <span data-i18n="autoRemove">自动抠图</span>
                        </button>
                        <button class="mode-nav__btn" data-mode="manual">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M12 19l7-7 3 3-7 7-3-3z"/>
                                <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
                                <path d="M2 2l7.586 7.586"/>
                            </svg>
                            <span data-i18n="manualBrush">手动画笔</span>
                        </button>
                    </nav>
                </div>

                <!-- 自动抠图设置 -->
                <div class="card-section" id="autoSettings" style="display: none;">
                    <h3 class="card-section__title" data-i18n="removalSettings">抠图设置</h3>
                    <div class="control-group">
                        <label class="control-group__label">
                            <span data-i18n="targetColor">目标颜色</span>
                            <div class="color-target-selector">
                                <div class="color-preview" id="targetColorPreview" style="background: #ffffff;"></div>
                                <button class="btn btn--small btn--secondary" id="pickColorBtn">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                                        <path d="M12 19l7-7 3 3-7 7-3-3z"/>
                                        <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
                                    </svg>
                                    <span data-i18n="pickColor">取色</span>
                                </button>
                                <button class="btn btn--small btn--secondary" id="autoDetectColorBtn">
                                    <span data-i18n="autoDetectColor">自动检测</span>
                                </button>
                            </div>
                        </label>
                        <label class="control-group__label">
                            <span data-i18n="tolerance">容差</span>: <span id="toleranceValue">30</span>
                            <div class="input-with-slider">
                                <input type="range" id="toleranceSlider" class="slider" value="30" min="0" max="100">
                            </div>
                        </label>
                        <label class="control-group__label">
                            <span data-i18n="feather">羽化</span>: <span id="featherValue">2</span>px
                            <div class="input-with-slider">
                                <input type="range" id="featherSlider" class="slider" value="2" min="0" max="10">
                            </div>
                        </label>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn--primary btn--full" id="applyRemovalBtn">
                            <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                            </svg>
                            <span data-i18n="applyRemoval">应用抠图</span>
                        </button>
                    </div>
                </div>

                <!-- 手动画笔工具 -->
                <div class="card-section" id="manualTools" style="display: none;">
                    <h3 class="card-section__title" data-i18n="brushTools">画笔工具</h3>
                    <div class="brush-mode-toggle">
                        <button class="brush-mode-btn brush-mode-btn--active" data-brush="erase">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                <path d="M20 20H7L3 16c-.6-.6-.6-1.5 0-2.1l10-10c.6-.6 1.5-.6 2.1 0l6.9 6.9c.6.6.6 1.5 0 2.1L15 20"/>
                                <path d="M6 11l6 6"/>
                            </svg>
                            <span data-i18n="brushModeErase">擦除</span>
                        </button>
                        <button class="brush-mode-btn" data-brush="restore">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
                                <path d="M12 8v8"/>
                                <path d="M8 12h8"/>
                            </svg>
                            <span data-i18n="brushModeRestore">恢复</span>
                        </button>
                    </div>
                    <div class="control-group">
                        <label class="control-group__label">
                            <span data-i18n="brushSize">画笔大小</span>: <span id="brushSizeValue">30</span>px
                            <div class="input-with-slider">
                                <input type="range" id="brushSizeSlider" class="slider" value="30" min="5" max="100">
                            </div>
                        </label>
                    </div>
                    <div class="btn-group btn-group--tight">
                        <button class="btn btn--secondary btn--small" id="undoBrushBtn" disabled>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                                <path d="M3 7v6h6"/>
                                <path d="M21 17a9 9 0 00-9-9 9 9 0 00-6.36 2.64L3 13"/>
                            </svg>
                            <span data-i18n="undo">撤销</span>
                        </button>
                        <button class="btn btn--secondary btn--small" id="redoBrushBtn" disabled>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                                <path d="M21 7v6h-6"/>
                                <path d="M3 17a9 9 0 019-9 9 9 0 016.36 2.64L21 13"/>
                            </svg>
                            <span data-i18n="redo">重做</span>
                        </button>
                    </div>
                </div>

                <!-- 底色填充 -->
                <div class="card-section" id="fillSettings" style="display: none;">
                    <h3 class="card-section__title" data-i18n="fillBackground">底色填充</h3>
                    <div class="control-group">
                        <label class="control-group__label">
                            <span data-i18n="fillColor">填充颜色</span>
                            <div class="color-picker-inline">
                                <input type="color" id="fillColorInput" value="#ffffff" class="color-input-native">
                                <input type="text" id="fillColorText" value="#FFFFFF" class="control-group__input control-group__input--small" maxlength="7">
                                <button class="btn btn--small btn--secondary" id="transparentBgBtn" data-i18n="transparent">透明</button>
                            </div>
                        </label>
                    </div>
                    <div class="preset-colors">
                        <button class="preset-color" data-color="#ffffff" style="background: #ffffff;" title="白色"></button>
                        <button class="preset-color" data-color="#000000" style="background: #000000;" title="黑色"></button>
                        <button class="preset-color" data-color="#ff0000" style="background: #ff0000;" title="红色"></button>
                        <button class="preset-color" data-color="#00ff00" style="background: #00ff00;" title="绿色"></button>
                        <button class="preset-color" data-color="#0000ff" style="background: #0000ff;" title="蓝色"></button>
                        <button class="preset-color" data-color="#ffff00" style="background: #ffff00;" title="黄色"></button>
                        <button class="preset-color" data-color="#ff00ff" style="background: #ff00ff;" title="品红"></button>
                        <button class="preset-color" data-color="#00ffff" style="background: #00ffff;" title="青色"></button>
                    </div>
                </div>

                <!-- 导出选项 -->
                <div class="card-section" id="exportSection" style="display: none;">
                    <h3 class="card-section__title" data-i18n="exportOptions">导出选项</h3>
                    <div class="control-group">
                        <label class="control-group__label">
                            <span data-i18n="exportFormat">导出格式</span>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" name="exportFormat" value="png" checked>
                                    <span>PNG</span>
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="exportFormat" value="jpg">
                                    <span>JPG</span>
                                </label>
                            </div>
                        </label>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn--secondary" id="downloadCurrentBtn" disabled>
                            <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            <span data-i18n="downloadCurrent">下载当前</span>
                        </button>
                        <button class="btn btn--primary" id="downloadAllBtn" disabled>
                            <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            <span data-i18n="batchExport">批量导出</span>
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 右侧预览区域 -->
        <section class="preview-area">
            <!-- 主预览区域 -->
            <div class="preview-section preview-section--main">
                <h2 class="section-title">
                    <span data-i18n="preview">预览</span>
                    <div class="preview-info">
                        <span class="tag" id="imageSizeTag">-- × --</span>
                    </div>
                    <button class="btn btn--small btn--secondary" id="resetBtn" style="display: none;" data-i18n-title="retry">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                            <path d="M3 3v5h5"/>
                        </svg>
                        <span data-i18n="retry">重试</span>
                    </button>
                    <div class="zoom-control">
                        <span class="zoom-control__label" data-i18n="zoom">缩放</span>
                        <input type="range" id="previewZoomSlider" class="zoom-slider" min="10" max="200" value="100">
                        <span class="zoom-control__value" id="previewZoomValue">100%</span>
                    </div>
                </h2>
                <div class="preview-container preview-container--checkerboard" id="previewContainer">
                    <div class="preview-placeholder" id="previewPlaceholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <p data-i18n="uploadToStart">上传图片开始处理</p>
                    </div>
                    <div class="preview-wrapper" id="previewWrapper" style="display: none;">
                        <canvas id="previewCanvas"></canvas>
                        <canvas id="overlayCanvas" class="overlay-canvas"></canvas>
                    </div>
                </div>
            </div>

            <!-- 缩略图列表 -->
            <div class="thumbnail-bar" id="thumbnailBar">
                <div class="thumbnail-list" id="thumbnailList">
                    <!-- 缩略图将通过JS动态添加 -->
                </div>
                <button class="thumbnail-add-btn" id="addMoreBtn" data-i18n-title="addMoreImages">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                </button>
            </div>
        </section>
    </main>

    <!-- 加载状态 -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-spinner"></div>
        <p class="loading-text" id="loadingText" data-i18n="loadingProcessing">处理中...</p>
    </div>

    <!-- 进度条 -->
    <div class="progress-bar" id="progressBar" style="display: none;">
        <div class="progress-bar__fill" id="progressFill"></div>
        <span class="progress-bar__text" id="progressText">0%</span>
    </div>

    <!-- Toast 提示 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 取色器放大镜 -->
    <div class="color-picker-magnifier" id="colorPickerMagnifier" style="display: none;">
        <canvas id="magnifierCanvas" width="100" height="100"></canvas>
        <div class="magnifier-crosshair"></div>
    </div>

    <!-- 脚本 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="../js/config/constants.js"></script>
    <script src="../js/utils/domUtils.js"></script>
    <script src="../js/utils/canvasUtils.js"></script>
    <script src="../js/utils/fileUtils.js"></script>
    <script src="../js/utils/colorUtils.js"></script>
    <script src="../js/utils/previewUtils.js"></script>
    <script src="../js/modules/backgroundRemover.js"></script>
    <script src="../js/modules/brushTool.js"></script>
    <script src="../js/modules/batchProcessor.js"></script>
    <script src="../js/modules/colorFiller.js"></script>
    <script src="../js/backgroundRemoverApp.js"></script>

    <!-- 分享弹窗 -->
    <div class="share-modal" id="shareModal">
        <div class="share-modal__content">
            <div class="share-modal__header">
                <h3 data-i18n="shareTitle">分享 Magic Pixel</h3>
                <button class="share-modal__close" id="shareModalClose">&times;</button>
            </div>
            <div class="share-modal__body">
                <div class="share-copy-link">
                    <input type="text" class="share-copy-link__input" id="shareUrlInput" readonly>
                    <button class="share-copy-link__btn" id="copyLinkBtn" data-i18n="shareCopyLink">复制链接</button>
                </div>
                <div class="share-platforms">
                    <button class="share-platform share-platform--weibo" data-platform="weibo">
                        <span class="share-platform__icon">微</span>
                        <span class="share-platform__name" data-i18n="shareWeibo">微博</span>
                    </button>
                    <button class="share-platform share-platform--twitter" data-platform="twitter">
                        <span class="share-platform__icon">X</span>
                        <span class="share-platform__name" data-i18n="shareTwitter">Twitter</span>
                    </button>
                    <button class="share-platform share-platform--wechat" data-platform="wechat">
                        <span class="share-platform__icon">微</span>
                        <span class="share-platform__name" data-i18n="shareWechat">微信</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/config/translations.js"></script>
    <script src="../js/modules/i18n.js"></script>
    <script src="../js/modules/share.js"></script>
</body>
</html>
